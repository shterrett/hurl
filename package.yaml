name:                hurl
version:             0.1.0.0
github:              "shterrett/hurl"
license:             MIT
author:              "Stuart Terrett"
maintainer:          "shterrett@gmail.com"
copyright:           "2026 Stuart Terrett"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/hurl#readme>

dependencies:
- aeson
- base >= 4.7 && < 5
- bytestring
- case-insensitive
- crypton-connection
- diagnose
- http-client >= 0.7
- http-client-tls >= 0.3
- http-types >= 0.12
- megaparsec
- monad-validate
- parser-combinators
- text
- tls

language: GHC2024

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

executables:
  hurl-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - hurl

tests:
  hurl-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    other-modules:
    - Hurl.ParserSpec
    - Hurl.HttpSpec
    dependencies:
    - hurl
    - hspec >= 2.7
    - hedgehog
    - hspec-hedgehog
    - aeson-qq
    - containers
    - wai
    - warp
